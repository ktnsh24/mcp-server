services:
  app:
    build: .
    ports:
      - "8300:8300"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=8300
      - LOG_LEVEL=info
      - CLOUD_PROVIDER=local
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mcp_data
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=mcp_pass
      - PORTFOLIO_API_URL=http://host.docker.internal:8200
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mcp_data
      - POSTGRES_USER=mcp_user
      - POSTGRES_PASSWORD=mcp_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
