# =============================================================================
# Deploy to Azure — Container Apps
# =============================================================================
# Triggered manually or after CI passes on main.
# Builds Docker image, pushes to ACR, applies Terraform, updates Container App.

name: Deploy Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg

permissions:
  id-token: write
  contents: read

env:
  AZURE_REGION: westeurope

jobs:
  deploy:
    name: Deploy to Azure ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: azure-${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          npm ci && npm run build
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/mcp-server:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/mcp-server:${{ github.sha }}

      - name: Deploy Terraform
        working-directory: infra/azure
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="environment=${{ github.event.inputs.environment }}"

      - name: Update Container App
        run: |
          az containerapp update \
            --name mcp-server \
            --resource-group rg-mcp-server \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/mcp-server:${{ github.sha }}
